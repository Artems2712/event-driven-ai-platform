name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: mypy
        run: mypy ai_platform
      - name: pytest
        run: pytest
