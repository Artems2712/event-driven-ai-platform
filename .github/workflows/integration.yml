name: integration

on:
  push:
  pull_request:

jobs:
  external-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
      qdrant:
        image: qdrant/qdrant:v1.12.6
        ports:
          - 6333:6333
    env:
      RUN_INTEGRATION: "true"
      POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/ai_platform
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
      QDRANT_URL: http://127.0.0.1:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev,runtime]"
      - name: Wait for Qdrant
        run: |
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:6333/collections && exit 0
            sleep 2
          done
          exit 1
      - name: Run external adapter tests
        run: pytest -m integration
